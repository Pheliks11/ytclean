<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YTClean">
  <meta name="theme-color" content="#0a0a0a">
  <title>YTClean</title>
  <style>
    :root {
      --bg:       #0a0a0a;
      --card:     #1a1a1a;
      --elevated: #222;
      --text:     #f5f5f7;
      --text-2:   #86868b;
      --accent:   #ff3b30;
      --accent-g: rgba(255,59,48,0.18);
      --border:   rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.13);
      --radius:   18px;
      --ease:     cubic-bezier(0.16,1,0.3,1);
      --safe-t:   env(safe-area-inset-top);
      --safe-b:   env(safe-area-inset-bottom);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'SF Pro Display', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      padding: calc(var(--safe-t) + 48px) 24px calc(var(--safe-b) + 32px);
      align-items: center;
    }
    .app-icon {
      width: 100px; height: 100px; border-radius: 26px;
      background: linear-gradient(145deg, #1c1c1c, #242424);
      border: 1px solid var(--border-h);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 8px 40px rgba(255,59,48,0.22);
    }
    .app-icon svg { width: 52px; height: 52px; }
    h1 {
      font-size: clamp(2.2rem, 9vw, 3rem);
      font-weight: 700; letter-spacing: -0.04em;
      margin-bottom: 10px; text-align: center;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-size: 16px; color: var(--text-2);
      text-align: center; line-height: 1.55;
      max-width: 290px; margin-bottom: 36px;
    }
    .section-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; color: var(--text-2);
      text-transform: uppercase;
      align-self: flex-start; margin-bottom: 10px;
      padding-left: 4px; width: 100%; max-width: 360px;
    }
    .cta-primary {
      width: 100%; max-width: 360px;
      padding: 17px; border-radius: var(--radius);
      border: none; background: var(--accent);
      color: #fff; font-size: 17px; font-weight: 600;
      letter-spacing: -0.01em; cursor: pointer;
      transition: transform 0.15s var(--ease);
      box-shadow: 0 4px 28px var(--accent-g);
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 16px;
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      -webkit-appearance: none;
    }
    .cta-primary:active { transform: scale(0.96); }
    .cta-primary svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .links-grid {
      display: grid; grid-template-columns: 1fr;
      gap: 12px; width: 100%; max-width: 360px;
      margin-bottom: 28px;
    }
    .link-card {
      display: flex; flex-direction: row;
      align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text); cursor: pointer;
      transition: transform 0.15s var(--ease), background 0.2s;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      border: 1px solid var(--border);
      text-align: left; width: 100%;
    }
    .link-card:active { transform: scale(0.97); background: var(--elevated); }
    .link-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .link-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .li-red   { background: rgba(255,59,48,0.15);  color: #ff3b30; }
    .li-green { background: rgba(52,199,89,0.15);  color: #34c759; }
    .link-text { display: flex; flex-direction: column; gap: 2px; }
    .link-label { font-size: 14px; font-weight: 600; color: var(--text); }
    .link-desc  { font-size: 12px; color: var(--text-2); }
    .footer { margin-top: auto; padding-top: 40px; font-size: 12px; color: var(--text-2); text-align: center; opacity: 0.4; }
  </style>
</head>
<body>
<div class="page">

  <div class="app-icon">
    <svg viewBox="0 0 52 52" fill="none">
      <rect width="52" height="52" rx="14" fill="#ff3b30" opacity="0.12"/>
      <polygon points="21,15 40,26 21,37" fill="#ff3b30"/>
      <line x1="12" y1="19" x2="12" y2="33" stroke="#ff3b30" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="17" y1="15" x2="17" y2="37" stroke="#ff3b30" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
    </svg>
  </div>

  <h1>YT<span>Clean</span></h1>
  <p class="subtitle">YouTube direkt zu deinen Abonnements — ohne Shorts, ohne Algorithmus.</p>

  <button class="cta-primary" onclick="openSafari('https://www.youtube.com/feed/subscriptions')">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Abonnements öffnen
  </button>

  <p class="section-label">Schnellzugriff</p>
  <div class="links-grid">
    <button class="link-card" onclick="openSafari('https://www.youtube.com/feed/history')">
      <div class="link-icon li-green">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="link-text">
        <div class="link-label">Verlauf</div>
        <div class="link-desc">Zuletzt gesehen</div>
      </div>
    </button>
    <button class="link-card" onclick="openSafari('https://www.youtube.com/feed/library')">
      <div class="link-icon li-red">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="link-text">
        <div class="link-label">Bibliothek</div>
        <div class="link-desc">Playlists &amp; Später</div>
      </div>
    </button>
  </div>

  <p class="footer">YTClean · Wilcke Worte &amp; Visionen</p>
</div>

<script>
  function openSafari(url) {
    // Einzige Methode die im iOS PWA-Modus Safari erzwingt:
    // Dynamisch erzeugter <a> mit target="_blank" + simulierter Klick
    var a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
</script>
</body>
</html>
